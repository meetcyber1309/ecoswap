<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Ecoswap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">🌿 Ecoswap</a>
    <div class="navbar-links">
      <a href="index.html">Browse All</a>
      <a href="add-item.html" class="btn-nav-cta">+ Post Item</a>
      <span class="nav-username" id="nav-user-name"></span>
      <button class="btn-nav-logout" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- ── Dashboard Banner ───────────────────────────────── -->
  <div class="dashboard-banner">
    <div class="dashboard-inner">
      <div>
        <h2 id="welcomeMsg">Welcome back!</h2>
        <p>Manage your listings and track your trades</p>
      </div>
      <a href="add-item.html" class="btn btn-primary">+ Post New Item</a>
    </div>
  </div>

  <!-- ── Content ────────────────────────────────────────── -->
  <div class="section">

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="myItemsCount">—</div>
        <div class="stat-label">Total Listings</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="myTradedCount">—</div>
        <div class="stat-label">Successfully Traded</div>
      </div>
    </div>

    <!-- My Listings -->
    <div class="section-header">
      <div>
        <h2 class="section-title">Your Listings</h2>
        <p class="section-subtitle">Edit, mark as traded, or delete your items</p>
      </div>
    </div>

    <div id="myItemsContainer"></div>
  </div>

  <footer>
    <p>© 2026 Ecoswap — Connecting Communities Through Trade</p>
  </footer>

  <script src="app.js"></script>
  <script>
    if (!auth.isLoggedIn()) window.location.replace("login.html");
    const user = auth.getUser();
    if (user) {
      document.getElementById("welcomeMsg").textContent = `Welcome back, ${user.name}!`;
      const nameEl = document.getElementById("nav-user-name");
      if (nameEl) nameEl.textContent = user.name;
    }
  </script>
</body>
</html>
