<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ecoswap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">🌿 Ecoswap</a>
    <div class="navbar-links">
      <a href="index.html">Home</a>
      <a href="register.html" class="btn-nav-cta">Register</a>
    </div>
  </nav>

  <!-- ── Login Form ─────────────────────────────────────── -->
  <div class="form-container">
    <div class="form-header">
      <h2>Welcome Back</h2>
      <p>Sign in to continue trading with your community</p>
    </div>

    <!-- Inline error/success alert -->
    <div id="alertBox" class="alert" role="alert"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
    </div>

    <button class="btn btn-primary btn-full" id="loginBtn">Login</button>

    <div class="form-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Redirect away if already logged in
    if (auth.isLoggedIn()) window.location.replace("dashboard.html");

    // ── Helpers ───────────────────────────────────────────
    function showAlert(message, type) {
      const box = document.getElementById("alertBox");
      box.textContent = message;
      box.className = `alert alert-${type} show`;
    }

    // ── Submit handler ────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("loginBtn");

      if (!email || !password) {
        showAlert("Please fill in all fields.", "error");
        return;
      }

      btn.disabled    = true;
      btn.textContent = "Logging in…";

      try {
        const res  = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.token) {
          auth.setSession(data.token, data.user);
          showToast("Login successful!", "success");
          setTimeout(() => window.location.href = "dashboard.html", 800);
        } else {
          showAlert(data.message || "Login failed. Please try again.", "error");
          btn.disabled    = false;
          btn.textContent = "Login";
        }
      } catch {
        showAlert("Network error. Is the server running?", "error");
        btn.disabled    = false;
        btn.textContent = "Login";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", handleLogin);
    document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
  </script>
</body>
</html>
