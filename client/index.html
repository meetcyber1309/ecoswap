<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecoswap — Exchange Locally</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">🌿 Ecoswap</a>
    <div class="navbar-links">
      <div id="nav-auth" style="display:flex;gap:6px">
        <a href="login.html">Login</a>
        <a href="register.html" class="btn-nav-cta">Register</a>
      </div>
      <div id="nav-user" style="display:none;align-items:center;gap:4px">
        <a href="dashboard.html">Dashboard</a>
        <span class="nav-username" id="nav-user-name"></span>
        <button class="btn-nav-logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <!-- ── Hero ───────────────────────────────────────────── -->
  <section class="hero">
    <h2>Exchange Goods &amp; Services Locally</h2>
    <p>Trade items with your neighbors — no money needed. Build community, reduce waste.</p>
    <div class="hero-actions">
      <a href="register.html" class="btn btn-primary">Get Started Free</a>
      <a href="#listings"     class="btn btn-outline">Browse Listings</a>
    </div>
  </section>

  <!-- ── Marketplace Feed ───────────────────────────────── -->
  <div id="listings" class="section">
    <div class="section-header">
      <div>
        <h2 class="section-title">Available Listings</h2>
        <p class="section-subtitle" id="resultsCount">Loading…</p>
      </div>
      <a href="add-item.html" class="btn btn-primary">+ Post Item</a>
    </div>

    <!-- FEATURE 1: Search Bar -->
    <div class="search-bar-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by title, description, category…"
        autocomplete="off"
      />
    </div>

    <!-- FEATURE 2: Category Pills -->
    <div id="categoryPills" class="pills-row"></div>

    <!-- Item Grid — populated by app.js -->
    <div id="itemsContainer" style="margin-top:24px"></div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer>
    <p>© 2026 Ecoswap — Connecting Communities Through Trade</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
